name: Binary

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Build binary bundle
        env:
          SCANOCR_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
        run: scripts/build-binary.sh

      - name: Test packaged binaries
        run: |
          archive=$(find dist -name 'scanocr-server-*-aarch64-darwin.tar.gz' -type f -print -quit)
          mkdir -p .release/test
          tar -xzf "$archive" -C .release/test
          bundle=$(find .release/test -name 'scanocr-server-*-aarch64-darwin' -type d -print -quit)
          SCANOCR_TEST_SERVER="$bundle/bin/scanocr-server" \
          SCANOCR_TEST_HELPER="$bundle/libexec/scanocr-native-helper" \
          SCANOCR_TEST_ALLOW_MISSING_TRANSLATION=1 \
            scripts/test.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: scanocr-server-aarch64-darwin
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.sha256 \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi
