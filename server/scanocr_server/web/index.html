<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScanOCR</title>
  <style>
    :root { color-scheme: light dark; --bg:#f4f1eb; --panel:#fffdf8; --ink:#20211f; --muted:#74766f; --line:#d9d4ca; --accent:#20695b; --danger:#9b382e; }
    @media (prefers-color-scheme:dark) { :root { --bg:#171916; --panel:#22241f; --ink:#f1efe9; --muted:#a7aaa1; --line:#42453d; --accent:#72cdb7; --danger:#ef8d83; } }
    * { box-sizing:border-box } body { margin:0; font:15px/1.55 ui-sans-serif,system-ui; background:var(--bg); color:var(--ink) }
    header { position:sticky; top:0; z-index:2; display:flex; align-items:center; gap:18px; padding:13px max(20px,calc((100vw - 1200px)/2)); background:color-mix(in srgb,var(--panel) 94%,transparent); border-bottom:1px solid var(--line); backdrop-filter:blur(16px) }
    header strong { font-size:19px; letter-spacing:.02em } header button { background:none; color:var(--muted); border:0; cursor:pointer; font:inherit } header button:hover { color:var(--ink) }
    main { max-width:1200px; margin:auto; padding:28px 20px 80px } h1 { margin:.1em 0 .2em; font-size:30px } h2 { font-size:19px }
    .muted { color:var(--muted) } .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; margin-top:22px }
    .card,.panel,.capture { background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:0 1px 3px #0000000c }
    .card { padding:18px; cursor:pointer } .card:hover { border-color:var(--accent) } .card h2 { margin:0 0 6px; overflow-wrap:anywhere }
    .panel { padding:18px; margin:20px 0 } label { display:grid; gap:5px; color:var(--muted) } input,select { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--ink); font:inherit }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:13px } .button-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center } button.action { padding:8px 12px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--ink); cursor:pointer } button.primary { color:white; background:var(--accent); border-color:var(--accent) } button.danger { color:var(--danger) }
    .capture { display:grid; grid-template-columns:minmax(260px,38%) 1fr; overflow:hidden; margin:18px 0 } .visual { min-height:210px; display:grid; place-items:center; background:#00000010; border-right:1px solid var(--line); cursor:pointer }
    .visual img { display:block; max-width:100%; max-height:360px; object-fit:contain } .results { min-width:0 } .text { padding:16px; white-space:pre-wrap; overflow-wrap:anywhere; min-height:90px } .text + .text { border-top:1px solid var(--line) }
    .capture footer { grid-column:1/-1; display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:10px 14px; border-top:1px solid var(--line); color:var(--muted) } .capture footer .spacer { flex:1 }
    .status { border-radius:99px; padding:2px 8px; background:color-mix(in srgb,var(--accent) 14%,transparent); color:var(--accent) } .error { color:var(--danger) }
    #unlock { position:fixed; inset:0; z-index:10; display:grid; place-items:center; background:var(--bg) } #unlock .panel { width:min(420px,calc(100% - 40px)) } #unlock form { display:grid; gap:12px }
    dialog { width:min(1100px,94vw); max-height:90vh; padding:0; border:1px solid var(--line); border-radius:12px; background:var(--panel) } dialog img { display:block; max-width:100%; max-height:86vh; margin:auto } dialog::backdrop { background:#000a }
    @media(max-width:760px) { .capture { grid-template-columns:1fr } .visual { border-right:0; border-bottom:1px solid var(--line) } }
  </style>
</head>
<body>
  <div id="unlock">
    <form class="panel" id="unlock-form">
      <h1>ScanOCR</h1><div class="muted">输入服务端 Bearer token。只保存在当前标签页会话中。</div>
      <input id="token" type="password" autocomplete="current-password" required placeholder="Token">
      <button class="action primary">解锁</button><div id="unlock-error" class="error"></div>
    </form>
  </div>
  <header><strong>ScanOCR</strong><button id="home">应用</button><button id="settings">设置</button><span class="muted" id="connection">未连接</span></header>
  <main id="content"></main>
  <dialog id="image-dialog"><img alt="原始截图"></dialog>
  <script>
  (() => {
    const content=document.querySelector('#content'), unlock=document.querySelector('#unlock'), connection=document.querySelector('#connection');
    let token=sessionStorage.getItem('scanocr-token')||'', current={page:'applications'}, abortEvents=null, pollTimer=null;
    const el=(tag,cls,text)=>{const n=document.createElement(tag); if(cls)n.className=cls; if(text!==undefined)n.textContent=text; return n};
    async function api(path,options={}) { const headers=new Headers(options.headers||{}); headers.set('Authorization','Bearer '+token); if(options.body && typeof options.body!=='string') {headers.set('Content-Type','application/json');options.body=JSON.stringify(options.body)} const r=await fetch(path,{...options,headers}); if(!r.ok){let e={};try{e=await r.json()}catch{};throw new Error(e.error?.message||`${r.status} ${r.statusText}`)} return r.status===204?null:r.json() }
    async function image(path,img) { const r=await fetch(path,{headers:{Authorization:'Bearer '+token}}); if(r.status===202)return false; if(!r.ok)return false; const url=URL.createObjectURL(await r.blob()); img.onload=()=>URL.revokeObjectURL(url);img.src=url;return true }
    function heading(title,subtitle){const f=document.createDocumentFragment();f.append(el('h1','',title),el('div','muted',subtitle));return f}
    function formatBytes(value){let size=Number(value)||0;const units=['B','KB','MB','GB','TB'];let unit=0;while(size>=1024&&unit<units.length-1){size/=1024;unit++}return `${unit===0?Math.round(size):size.toFixed(size>=10?1:2)} ${units[unit]}`}
    async function applications(){current={page:'applications'};content.replaceChildren(heading('应用','客户端 title 完全相同的截图会归入同一应用。'));const data=await api('/api/v1/applications');const grid=el('div','grid');for(const a of data.applications){const card=el('article','card');card.append(el('h2','',a.display_name||'无标题应用'),el('div','muted',`原始 title：${a.source_title||'（空）'}`),el('div','',`${a.capture_count} 张截图 · ${formatBytes(a.storage_bytes)} · ${a.latest_status||'—'}`));card.onclick=()=>application(a.id);grid.append(card)}content.append(grid)}
    function selectField(label,value,options,inherit=false){const wrap=el('label');wrap.append(document.createTextNode(label));const select=el('select');if(inherit){const o=el('option','','继承全局');o.value='';select.append(o)}for(const [v,t] of options){const o=el('option','',t);o.value=v;select.append(o)}if(value && !Array.from(select.options).some(o=>o.value===value)){const o=el('option','',`${value}（当前值）`);o.value=value;select.append(o)}select.value=value||'';wrap.append(select);return [wrap,select]}
    const fallbackTranslationLanguages=['ar','zh-Hans','zh-Hant','nl','en','fr','de','id','it','ja','ko','pl','pt','ru','es','th','tr','uk','vi'];
    function languageLabel(code){try{const name=new Intl.DisplayNames(['zh-Hans'],{type:'language'}).of(code);return `${name||code}（${code}）`}catch{return code}}
    function translationLanguageOptions(engines){const engine=engines.engines.find(e=>e.kind==='translation'),reported=engine?.supported_languages;const codes=Array.isArray(reported)&&reported.length?reported:fallbackTranslationLanguages;return [...new Set(codes)].map(code=>[code,languageLabel(code)]).sort((a,b)=>a[1].localeCompare(b[1],'zh-Hans'))}
    async function application(id){current={page:'application',id};const [app,caps,engines]=await Promise.all([api(`/api/v1/applications/${id}`),api(`/api/v1/applications/${id}/captures`),api('/api/v1/engines')]);content.replaceChildren(heading(app.display_name||'无标题应用',`原始 title：${app.source_title||'（空）'} · ${app.capture_count} 张截图 · 占用 ${formatBytes(app.storage_bytes)}`));const panel=el('section','panel'),form=el('div','form-grid');const name=el('input');name.value=app.display_name;const nameWrap=el('label','');nameWrap.append(document.createTextNode('显示名称'),name);const ocr=engines.engines.filter(e=>e.kind==='ocr').map(e=>[e.id,e.display_name+(e.available?'':`（${e.unavailable_reason}）`)]);const trans=engines.engines.filter(e=>e.kind==='translation').map(e=>[e.id,e.display_name+(e.available?'':`（${e.unavailable_reason}）`)]);const languages=translationLanguageOptions(engines);const [sw,source]=selectField('源语言',app.source_language_override,[['auto','自动检测'],...languages],true);const [tw,target]=selectField('目标语言',app.target_language_override,languages,true);const [ow,oe]=selectField('OCR 引擎',app.ocr_engine_override,ocr,true);const [xw,te]=selectField('翻译引擎',app.translation_engine_override,trans,true);form.append(nameWrap,sw,tw,ow,xw);const save=el('button','action primary','保存应用设置');save.onclick=async()=>{await api(`/api/v1/applications/${id}/settings`,{method:'PUT',body:{display_name:name.value,source_language_override:source.value||null,target_language_override:target.value||null,ocr_engine_override:oe.value||null,translation_engine_override:te.value||null}});application(id)};const remove=el('button','action danger','删除整个应用');remove.onclick=async()=>{if(confirm(`永久删除“${app.display_name||'无标题应用'}”及其 ${app.capture_count} 张截图？此操作无法撤销。`)){await api(`/api/v1/applications/${id}`,{method:'DELETE'});applications()}};const actions=el('div','button-row');actions.append(save,remove);panel.append(form,document.createElement('br'),actions);content.append(panel);for(const capture of caps.captures)content.append(await captureCard(capture))}
    async function captureCard(c){const card=el('article','capture'),visual=el('div','visual'),results=el('div','results');const img=el('img');if(c.thumbnail_status==='ready'){visual.append(img);image(`/api/v1/captures/${c.id}/thumbnail`,img)}else{visual.append(el('div',c.thumbnail_status==='failed'?'error':'muted',c.thumbnail_status==='failed'?'缩略图不可用':'正在生成缩略图…'))}visual.onclick=async()=>{const d=document.querySelector('#image-dialog'),i=d.querySelector('img');i.removeAttribute('src');await image(`/api/v1/captures/${c.id}/image`,i);d.showModal()};const ocr=el('div','text',c.ocr?.text||'等待 OCR…'),translation=el('div','text',c.translation?.text||(c.latest_translation_run?.error_message?`翻译失败：${c.latest_translation_run.error_message}`:'等待翻译…'));results.append(ocr,translation);const footer=el('footer');footer.append(el('span','status',c.status),el('span','',`${c.image_width}×${c.image_height}`),el('span','',`占用 ${formatBytes(c.storage_bytes)}`),el('span','spacer'));const rerunOcr=el('button','action','重新 OCR');rerunOcr.onclick=async()=>{await api(`/api/v1/captures/${c.id}/ocr-runs`,{method:'POST',body:{source_language:'ja',translate_after_success:true}});refresh()};const rerunTranslation=el('button','action','重新翻译');rerunTranslation.disabled=!c.current_ocr_run_id;rerunTranslation.onclick=async()=>{const target=prompt('目标语言（BCP 47）','zh-Hans');if(target){await api(`/api/v1/captures/${c.id}/translation-runs`,{method:'POST',body:{source_language:'ja',target_language:target}});refresh()}};footer.append(rerunOcr,rerunTranslation);if(c.thumbnail_status==='failed'){const retry=el('button','action','重试缩略图');retry.onclick=async()=>{await api(`/api/v1/captures/${c.id}/thumbnail-runs`,{method:'POST',body:{}});refresh()};footer.append(retry)}const del=el('button','action danger','删除');del.onclick=async()=>{if(confirm('永久删除这张截图？')){await api(`/api/v1/captures/${c.id}`,{method:'DELETE'});refresh()}};footer.append(del);card.append(visual,results,footer);return card}
    async function settings(){current={page:'settings'};const [s,e,storage]=await Promise.all([api('/api/v1/settings'),api('/api/v1/engines'),api('/api/v1/storage')]);content.replaceChildren(heading('设置','监听、token 和上传保险丝的修改需要重启服务。'));const panel=el('section','panel'),form=el('div','form-grid'),fields={};const languages=translationLanguageOptions(e);let w,v;[w,v]=selectField('默认源语言',s.default_source_language,[['auto','自动检测'],...languages]);form.append(w);fields.default_source_language=v;[w,v]=selectField('默认目标语言',s.default_target_language,languages);form.append(w);fields.default_target_language=v;const ocr=e.engines.filter(x=>x.kind==='ocr').map(x=>[x.id,x.display_name]);const tr=e.engines.filter(x=>x.kind==='translation').map(x=>[x.id,x.display_name]);[w,v]=selectField('默认 OCR 引擎',s.default_ocr_engine,ocr);form.append(w);fields.default_ocr_engine=v;[w,v]=selectField('默认翻译引擎',s.default_translation_engine,tr);form.append(w);fields.default_translation_engine=v;const paths=el('div','muted',`数据：${s.data_dir}\n数据库：${s.database_path}`);paths.style.whiteSpace='pre-wrap';const save=el('button','action primary','保存默认设置');save.onclick=async()=>{const body={};for(const [k,i] of Object.entries(fields))body[k]=i.value;await api('/api/v1/settings',{method:'PUT',body});settings()};panel.append(form,document.createElement('br'),save,document.createElement('br'),document.createElement('br'),paths);content.append(panel);const sp=el('section','panel');sp.append(el('h2','','存储空间'),el('div','',`总占用：${formatBytes(storage.total_bytes)}`),el('div','muted',`${storage.application_count} 个应用 · ${storage.capture_count} 张截图 · 截图文件 ${formatBytes(storage.capture_files_bytes)} · 数据库 ${formatBytes(storage.database_bytes)}`));const clear=el('button','action danger','清理全部数据');clear.onclick=async()=>{if(confirm('永久删除全部应用、截图、OCR 与翻译结果？服务配置和默认设置会保留，此操作无法撤销。')){await api('/api/v1/storage',{method:'DELETE'});settings()}};sp.append(document.createElement('br'),clear);content.append(sp);const ep=el('section','panel');ep.append(el('h2','','引擎状态'));for(const x of e.engines)ep.append(el('div',x.available?'':'error',`${x.display_name} · ${x.available?'可用':x.unavailable_reason} · 并发 ${x.max_concurrency}`));content.append(ep)}
    async function refresh(){try{if(current.page==='application')await application(current.id);else if(current.page==='settings')await settings();else await applications()}catch(e){content.replaceChildren(el('div','error',e.message))}}
    async function events(){abortEvents?.abort();abortEvents=new AbortController();try{const r=await fetch('/api/v1/events',{headers:{Authorization:'Bearer '+token},signal:abortEvents.signal});if(!r.ok)throw new Error('SSE failed');connection.textContent='已连接';clearInterval(pollTimer);pollTimer=null;const reader=r.body.pipeThrough(new TextDecoderStream()).getReader();let buffer='';while(true){const {value,done}=await reader.read();if(done)break;buffer+=value;let p;while((p=buffer.indexOf('\n\n'))>=0){const event=buffer.slice(0,p);buffer=buffer.slice(p+2);if(event.includes('data: '))refresh()}}}catch(e){if(e.name==='AbortError')return;connection.textContent='连接中断，轮询中';if(!pollTimer)pollTimer=setInterval(refresh,2000);setTimeout(events,2000)}}
    document.querySelector('#unlock-form').onsubmit=async e=>{e.preventDefault();token=document.querySelector('#token').value;try{await api('/api/v1/engines');sessionStorage.setItem('scanocr-token',token);unlock.style.display='none';await applications();events()}catch(err){document.querySelector('#unlock-error').textContent=err.message}};
    document.querySelector('#home').onclick=applications;document.querySelector('#settings').onclick=settings;document.querySelector('#image-dialog').onclick=e=>{if(e.target.tagName==='DIALOG')e.target.close()};
    if(token){unlock.style.display='none';applications().then(events).catch(()=>{unlock.style.display='grid';sessionStorage.removeItem('scanocr-token')})}
  })();
  </script>
</body>
</html>
